apiVersion: apps/v1
kind: Deployment
metadata:
  name: rent-api-deployment
spec:
  replicas: 2 # On commence avec 2 instances pour tester la haute disponibilité
  selector:
    matchLabels:
      app: rent-api
  template:
    metadata:
      labels:
        app: rent-api
    spec:
      containers:
      - name: rent-api-container
        image: anthonymva/mon-api-rent:v1
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: rent-api-service
spec:
  type: NodePort
  selector:
    app: rent-api
  ports:
    - port: 8080        # Port interne au cluster
      targetPort: 8080  # Port exposé par le conteneur
      nodePort: 30000   # Port externe pour accéder depuis ta VM Kali
