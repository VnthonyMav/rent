name: CI/CD Docker & Kubernetes

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Récupérer le code
        uses: actions/checkout@v3

      - name: 2. Se connecter au Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 3. Construire et envoyer l'image Docker
        uses: docker/build-push-action@v4
        with:
          context: ./MyService
          push: true
          tags: anthonymva/mon-api-rent:v1

      - name: 4. Démarrer un cluster Kubernetes (Minikube)
        uses: medyagh/setup-minikube@latest

      - name: 5. Déployer l'application sur le cluster
        run: |
          kubectl apply -f k8s/app-deploiement.yaml
          
      - name: 6. Vérifier l'état des Pods
        run: |
          kubectl get pods
          kubectl get services
